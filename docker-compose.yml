services:
  redis:
    image: redis:7-alpine
    container_name: api-redis
    restart: unless-stopped
    # Properly parameterized command
    command: [ "redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASS}" ]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: api-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  postgres:
    image: postgres:16-alpine
    container_name: api-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}' ]
      interval: 10s
      timeout: 5s
      retries: 5

  create-kong-db:
    image: postgres:16-alpine
    container_name: create-kong-db
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    command:
      - sh
      - -c
      - |
        psql -h postgres -U ${POSTGRES_USER} -d ${POSTGRES_DB} -tc "SELECT 1 FROM pg_database WHERE datname = '${POSTGRES_KONG_DB}'" | grep -q 1 || \
        psql -h postgres -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c "CREATE DATABASE ${POSTGRES_KONG_DB};"

  kong:
    image: kong/kong-gateway:3.14
    container_name: kong
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KONG_DATABASE: ${KONG_DB_DIALECT}

      # IMPORTANT: internal docker network, NOT your .env values
      KONG_PG_HOST: ${KONG_PG_HOST}
      KONG_PG_PORT: ${POSTGRES_PORT}
      KONG_PG_DATABASE: ${POSTGRES_KONG_DB}
      KONG_PG_USER: ${POSTGRES_USER}
      KONG_PG_PASSWORD: ${POSTGRES_PASSWORD}

      KONG_PROXY_LISTEN: ${KONG_PROXY_LISTEN}
      KONG_ADMIN_LISTEN: ${KONG_ADMIN_LISTEN}

      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr

    ports:
      - "${KONG_PROXY_PORT}:8000"
      - "${KONG_ADMIN_PORT}:8001"

volumes:
  redis_data:
  rabbitmq_data:
  postgres_data:
